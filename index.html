<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captcha</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Popup */
.captcha-popup {
    background: white;
    width: 90%;
    max-width: 400px;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    text-align: center;
}

/* Checkbox style */
.checkbox {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #ccc;
    padding: 15px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
}

/* ô vuông */
.box {
    width: 28px;
    height: 28px;
    border: 2px solid #333;
    margin-right: 10px;
}

/* trạng thái check */
.checked {
    background: #4CAF50;
}

/* text lớn hơn trên mobile */
@media (max-width: 480px) {
    .captcha-popup {
        padding: 25px;
    }
    .checkbox {
        font-size: 20px;
        padding: 18px;
    }
    .box {
        width: 32px;
        height: 32px;
    }
}
</style>
</head>

<body>

<div class="captcha-popup">
    <h2>Xác minh</h2>

    <div class="checkbox" onclick="verify()">
        <div id="box" class="box"></div>
        Tôi không phải là người máy
    </div>

    <p id="result"></p>
</div>

<script>
function verify() {
    let box = document.getElementById("box");
    let result = document.getElementById("result");

    box.classList.add("checked");
    result.style.color = "green";
    result.innerText = "✔ Đã xác minh!";
}
</script>

</body>
</html>
